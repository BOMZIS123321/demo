<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Lapa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Noņemam liekās malas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Neļauj parādīties ritjoslām */
        }

        /* IDEĀLI NOCENTRĒTS VIDEO FONS */
        .video-background {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
        }

        /* TUMŠAIS UN BLURRY SLĀNIS PĀRI VIDEO */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
            z-index: -1;
        }

        /* Saturs precīzi ekrāna vidū */
        .content {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* MAZĀKI, MODERNĀKI BURTI */
        h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0px 4px 12px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-background">
        <source src="background.mp4" type="video/mp4">
        Jūsu pārlūkprogramma neatbalsta HTML5 video.
    </video>

    <div class="overlay"></div>

    <div class="content">
        <h1>Demo lapa</h1>
    </div>

    <script async type='module' src='https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js'></script>
    <zapier-interfaces-chatbot-embed is-popup='true' chatbot-id='cmqr11vd20014c68bihz45ofs'></zapier-interfaces-chatbot-embed>

</body>
</html>
